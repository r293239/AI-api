<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced AI Chatbot - Knowledge + Web Search</title>
    <style>
        /* Same CSS as before, plus these additions */
        .search-badge {
            background: #4a90e2;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 8px;
        }
        
        .knowledge-tag {
            background: #50c878;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }
        
        .message.bot a {
            color: #4a90e2;
            text-decoration: none;
        }
        
        .message.bot a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">
            <h3>🧠 Enhanced AI Chatbot</h3>
            <small>
                <span class="knowledge-tag">1000+ facts</span>
                <span class="search-badge">Web search enabled</span>
            </small>
        </div>
        
        <div class="messages" id="messages">
            <div class="message bot">
                🌍 I now have a massive knowledge base and can search the web!<br>
                Try asking about countries, books, history, or type "/search [query]" for web search!
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask me anything... (use /search for web)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Load scripts in order -->
    <script src="knowledge_base.js"></script>
    <script src="web_search.js"></script>
    <script src="enhanced_conversation_ai.js"></script>
    <script src="chat.js"></script>
</body>
</html>
